services:
  bandwacht-web:
    build:
      context: .
      dockerfile: web/Dockerfile.web
    container_name: bandwacht-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3418:8000"
    volumes:
      - bandwacht-data:/app/data
      - bandwacht-recordings:/app/recordings
    environment:
      - BANDWACHT_DATABASE_URL=sqlite+aiosqlite:////app/data/bandwacht_web.db
      - BANDWACHT_RECORDINGS_DIR=/app/recordings
      - BANDWACHT_CORS_ORIGINS=${CORS_ORIGIN:-https://bandwacht.oeradio.at}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - cloudflared-tunnel

volumes:
  bandwacht-data:
    driver: local
  bandwacht-recordings:
    driver: local

networks:
  cloudflared-tunnel:
    external: true
