services:
  bandwacht-web:
    build:
      context: .
      dockerfile: web/Dockerfile.web
    container_name: bandwacht-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3418:8000"
    volumes:
      - bandwacht-data:/app/data
      - bandwacht-recordings:/app/recordings
    environment:
      - BANDWACHT_DATABASE_URL=sqlite+aiosqlite:////app/data/bandwacht_web.db
      - BANDWACHT_RECORDINGS_DIR=/app/recordings
      - BANDWACHT_CORS_ORIGINS=${CORS_ORIGIN:-https://bandwacht.oeradio.at}
      # Notifications (set in .env on the deploy host)
      - BANDWACHT_NOTIFY_TELEGRAM_BOT_TOKEN=${BANDWACHT_NOTIFY_TELEGRAM_BOT_TOKEN:-}
      - BANDWACHT_NOTIFY_TELEGRAM_CHAT_ID=${BANDWACHT_NOTIFY_TELEGRAM_CHAT_ID:-}
      - BANDWACHT_NOTIFY_GOTIFY_URL=${BANDWACHT_NOTIFY_GOTIFY_URL:-}
      - BANDWACHT_NOTIFY_GOTIFY_TOKEN=${BANDWACHT_NOTIFY_GOTIFY_TOKEN:-}
      - BANDWACHT_NOTIFY_NTFY_TOPIC=${BANDWACHT_NOTIFY_NTFY_TOPIC:-}
      - BANDWACHT_NOTIFY_NTFY_SERVER=${BANDWACHT_NOTIFY_NTFY_SERVER:-https://ntfy.sh}
      - BANDWACHT_NOTIFY_WEBHOOK_URL=${BANDWACHT_NOTIFY_WEBHOOK_URL:-}
      # Auth (override defaults if needed)
      - BANDWACHT_AUTH_JWT_SECRET=${BANDWACHT_AUTH_JWT_SECRET:-ffb6fd1d4976c9354a93ca92124b144cf217a54821b69dbf206040ba65f59a2a}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - cloudflared-tunnel

volumes:
  bandwacht-data:
    driver: local
  bandwacht-recordings:
    driver: local

networks:
  cloudflared-tunnel:
    external: true
